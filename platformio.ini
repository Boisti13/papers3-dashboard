; PlatformIO Project Configuration File — M5Stack PaperS3 (SKU C139)

[env:PaperS3]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino

; 16 MB flash, 8 MB octal PSRAM
board_build.partitions    = default_16MB.csv
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; LVGL — lv_conf.h lives in src/, which PlatformIO adds to include path
    -DLV_CONF_INCLUDE_SIMPLE
    ; Expose project src/ (lv_conf.h) to library builds
    -I src
    ; Increase loop task stack from default 8KB — needed for LVGL object creation in callbacks
    -DARDUINO_LOOP_STACK_SIZE=16384

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    m5stack/M5Unified @ ^0.2.5
    lvgl/lvgl@^8.3.0
    knolleary/PubSubClient@^2.8.0
    bblanchon/ArduinoJson@^7.0.0
