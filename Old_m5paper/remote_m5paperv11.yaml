  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"

external_components:
  - source: github://Passific/m5paper_esphome

logger:
  level: INFO

psram:

api:
  encryption:
    key: "+TZ9WzyNTvX5JmLiSNIrhQ6jeOFw1yPwJQa1A/eCmQI="

ota:
  - platform: esphome
    password: "516ccc32a84d287ebdbe9d07e2b7a4a1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Remote-M5Paperv11"
    password: "Svw4IogFcXPe"

