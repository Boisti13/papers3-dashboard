substitutions:
  C_BG: "${GRAY_F}"
  C_SURFACE: "${GRAY_D}"
  C_BORDER: "${GRAY_B}"
  C_DIVIDER: "${GRAY_C}"
  C_TEXT: "${GRAY_0}"
  C_TEXT_MUTED: "${GRAY_7}"

lvgl:
  style_definitions:
    - id: st_header_bar
      bg_color: ${C_SURFACE}
      bg_opa: COVER
      border_width: 0
      radius: 0
      pad_all: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_footer_bar
      bg_color: ${C_SURFACE}
      bg_opa: COVER
      border_width: 0
      radius: 0
      pad_all: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_divider
      line_color: ${C_DIVIDER}
      line_width: 1
      line_rounded: false

    - id: st_header_text
      text_color: ${C_TEXT}
      text_font: font_ubuntu_xs
      bg_opa: TRANSP
      border_width: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_title_text
      text_color: ${C_TEXT}
      text_font: font_ubuntu_l
      bg_opa: TRANSP
      border_width: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_icon_text
      text_color: ${C_TEXT}
      text_font: font_mdi_l
      bg_opa: TRANSP
      border_width: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_page_bg
      bg_color: ${C_BG}
      bg_opa: COVER
      border_width: 0
      radius: 0
      pad_all: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_page_content
      bg_color: ${C_BG}
      bg_opa: COVER
      border_width: 0
      radius: 0
      pad_all: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_tile_button
      bg_color: ${C_SURFACE}
      bg_opa: COVER
      border_color: ${C_BORDER}
      border_width: 1
      radius: 12
      text_color: ${C_TEXT}
      text_font: font_ubuntu_l
      shadow_width: 8
      shadow_color: ${GRAY_8}
      shadow_opa: 50%
      shadow_ofs_x: 4
      shadow_ofs_y: 4
      outline_width: 0
      pad_all: 0

    - id: st_card
      bg_color: ${C_SURFACE}
      bg_opa: COVER
      border_color: ${C_BORDER}
      border_width: 1
      radius: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0
      pad_all: 16

    - id: st_body_text
      text_color: ${C_TEXT}
      text_font: font_ubuntu_xl
      bg_opa: TRANSP
      border_width: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_body_text_muted
      text_color: ${C_TEXT_MUTED}
      text_font: font_ubuntu_s
      bg_opa: TRANSP
      border_width: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0

    - id: st_small_btn
      bg_color: ${C_SURFACE}
      bg_opa: COVER
      border_color: ${C_BORDER}
      border_width: 1
      radius: 0
      text_color: ${C_TEXT}
      text_font: font_ubuntu_xl
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0
      pad_all: 0

    - id: st_nav_button
      bg_color: ${C_SURFACE}
      bg_opa: COVER
      border_width: 0
      radius: 0
      pad_all: 0
      shadow_width: 0
      shadow_opa: TRANSP
      outline_width: 0