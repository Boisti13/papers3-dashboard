script:
  - id: ui_boot_init
    mode: restart
    then:
      - script.execute: ui_open_dashboard

  - id: ui_refresh_nav
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ui_left_enabled);'
          then:
            - lvgl.widget.show: btn_nav_left
          else:
            - lvgl.widget.hide: btn_nav_left

      - if:
          condition:
            lambda: 'return id(ui_right_enabled);'
          then:
            - lvgl.widget.show: btn_nav_more
          else:
            - lvgl.widget.hide: btn_nav_more

  - id: ui_apply_chrome
    mode: restart
    then:
      - lvgl.widget.show: ui_header_bar
      - lvgl.widget.show: hdr_divider
      - lvgl.widget.show: ui_footer_bar
      - lvgl.widget.show: nav_divider
      - script.execute: ui_refresh_header
      - script.execute: ui_refresh_nav
      - delay: 500ms
      - lambda: |-
          id(ui_next_draw_full) = false;

  - id: ui_full_refresh_once
    mode: restart
    then:
      - lambda: |-
          id(ui_next_draw_gc16) = true;
      - delay: 100ms
      - lambda: |-
          id(ui_next_draw_gc16) = false;

  - id: ui_handle_home
    mode: restart
    then:
      - script.execute: ui_open_dashboard

  - id: ui_handle_right
    mode: restart
    then:
      - script.execute: ui_open_more

  - id: ui_handle_left
    mode: restart
    then:
      - lambda: |-
          switch (id(ui_parent_page)) {
            case 1:
              id(ui_open_heating).execute();
              break;
            case 0:
            default:
              id(ui_open_dashboard).execute();
              break;
          }

  - id: ui_open_dashboard
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 0;
          id(ui_parent_page) = 0;
          id(ui_title) = "Dashboard";
          id(ui_left_enabled) = false;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_dashboard
      - script.execute: ui_apply_chrome

  - id: ui_open_heating
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 1;
          id(ui_parent_page) = 0;
          id(ui_title) = "Heating";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_heating
      - script.execute: ui_apply_chrome

  - id: ui_open_switches
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 2;
          id(ui_parent_page) = 0;
          id(ui_title) = "Switches";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_switches
      - script.execute: ui_apply_chrome
      - script.execute: page_switches_prepare

  - id: ui_open_cleaning
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 3;
          id(ui_parent_page) = 0;
          id(ui_title) = "Cleaning";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_cleaning
      - script.execute: ui_apply_chrome

  - id: ui_open_arthur
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 4;
          id(ui_parent_page) = 0;
          id(ui_title) = "Arthur";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_arthur
      - script.execute: ui_apply_chrome

  - id: ui_open_climate
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 5;
          id(ui_parent_page) = 0;
          id(ui_title) = "Climate";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_climate
      - script.execute: ui_apply_chrome

  - id: ui_open_thinklab
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 6;
          id(ui_parent_page) = 0;
          id(ui_title) = "ThinkLab";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_thinklab
      - script.execute: ui_apply_chrome

  - id: ui_open_room_arthur_heating
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 10;
          id(ui_parent_page) = 1;
          id(ui_title) = "Arthur";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = false;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_room_arthur
      - script.execute: ui_apply_chrome

  - id: ui_open_room_bat_heating
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 11;
          id(ui_parent_page) = 1;
          id(ui_title) = "Bathroom";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = false;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_room_bat
      - script.execute: ui_apply_chrome

  - id: ui_open_room_kit_heating
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 12;
          id(ui_parent_page) = 1;
          id(ui_title) = "Kitchen";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = false;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_room_kit
      - script.execute: ui_apply_chrome

  - id: ui_open_room_bed_heating
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 13;
          id(ui_parent_page) = 1;
          id(ui_title) = "Bedroom";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = false;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_room_bed
      - script.execute: ui_apply_chrome

  - id: ui_open_room_liv_heating
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 14;
          id(ui_parent_page) = 1;
          id(ui_title) = "Living Room";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = false;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_room_liv
      - script.execute: ui_apply_chrome

  - id: ui_open_more
    mode: restart
    then:
      - lambda: |-
          id(ui_page_index) = 7;
          id(ui_parent_page) = 0;
          id(ui_title) = "More";
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - lvgl.page.show: page_more
      - script.execute: ui_apply_chrome
      - script.execute: page_more_prepare

  - id: more_timeout_dec
    mode: restart
    then:
      - lambda: |-
          float v = id(sleep_time).state - 15.0f;
          if (v < 15.0f) v = 15.0f;
          auto call = id(sleep_time).make_call();
          call.set_value(v);
          call.perform();
      - lvgl.label.update:
          id: more_timeout_value
          text:
            format: "%ds"
            args:
              - '(int) id(sleep_time).state'

  - id: more_timeout_inc
    mode: restart
    then:
      - lambda: |-
          float v = id(sleep_time).state + 15.0f;
          if (v > 3600.0f) v = 3600.0f;
          auto call = id(sleep_time).make_call();
          call.set_value(v);
          call.perform();
      - lvgl.label.update:
          id: more_timeout_value
          text:
            format: "%ds"
            args:
              - '(int) id(sleep_time).state'

lvgl:
  top_layer:
    widgets:
      - line:
          id: nav_divider
          points:
            - 0, 872
            - 540, 872
          styles: st_divider

      - obj:
          id: ui_footer_bar
          x: 0
          y: 872
          width: 540
          height: 88
          styles: st_footer_bar
          clickable: false
          scrollable: false
          widgets:
            - button:
                id: btn_nav_left
                x: 0
                y: 0
                width: 88
                height: 88
                styles: st_nav_button
                pressed:
                  bg_color: 0xBBBBBB
                  bg_opa: COVER
                  outline_width: 0
                on_click:
                  - script.execute: ui_handle_left
                widgets:
                  - label:
                      align: CENTER
                      styles: st_icon_text
                      text: "${ICO_CHEV_L}"

            - button:
                id: btn_nav_home
                x: 226
                y: 0
                width: 88
                height: 88
                styles: st_nav_button
                pressed:
                  bg_color: 0xBBBBBB
                  bg_opa: COVER
                  outline_width: 0
                on_click:
                  - script.execute: ui_handle_home
                widgets:
                  - label:
                      align: CENTER
                      styles: st_icon_text
                      text: "${ICO_HOME}"

            - button:
                id: btn_nav_more
                x: 452
                y: 0
                width: 88
                height: 88
                styles: st_nav_button
                pressed:
                  bg_color: 0xBBBBBB
                  bg_opa: COVER
                  outline_width: 0
                on_click:
                  - script.execute: ui_handle_right
                widgets:
                  - label:
                      align: CENTER
                      styles: st_icon_text
                      text: "${ICO_MORE}"