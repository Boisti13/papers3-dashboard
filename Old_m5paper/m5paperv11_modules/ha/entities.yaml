  # Cleaning / Vacuum
  # -------------------------
  VACUUM_ENTITY: vacuum.roborock_s6_maxv

  VAC_ROOM_BATHROOM: input_boolean.vac_room_bad
  VAC_ROOM_HALLWAY: input_boolean.vac_room_flur
  VAC_ROOM_BEDROOM: input_boolean.vac_room_schlafzimmer
  VAC_ROOM_LIVING: input_boolean.vac_room_wohnzimmer
  VAC_ROOM_KIDS: input_boolean.vac_room_kinderzimmer
