  ENT_CO2_INDOOR: sensor.indoor_carbon_dioxide
  ENT_NOISE_INDOOR: sensor.indoor_noise
  ENT_AIR_PM25: sensor.airquality_1_pm25
  ENT_AIR_VOC_INDEX: sensor.airquality_1_voc_index

