  # climate entities
  # =========================
  ENT_climate_HOME: climate.home              # adjust to your HA climate entity
  ENT_OUTDOOR_TEMP: sensor.outdoor_2_temperature
  ENT_OUTDOOR_HUM: sensor.outdoor_2_humidity

  # Indoor / room climate sensors (Climate page)
  ENT_TEMP_LIVING: sensor.living_room_temperature
  ENT_TEMP_BEDROOM: sensor.indoor_temperature
  ENT_TEMP_HALLWAY: sensor.hallway_temperature
  ENT_TEMP_KITCHEN: sensor.kitchen_temperature
  ENT_TEMP_OUTDOOR: sensor.indoor_aussenmodul_temperature
  ENT_TEMP_KIDS: sensor.childs_room_temperature
  ENT_TEMP_BATHROOM: sensor.bathroom_temperature
  ENT_TEMP_CHEDDAR: sensor.cheddar_temp_temperature

  ENT_HUM_OUTDOOR: sensor.indoor_aussenmodul_humidity
  ENT_HUM_LIVING: sensor.living_room_humidity
  ENT_HUM_BEDROOM: sensor.bedroom_humidity
  ENT_HUM_HALLWAY: sensor.hallway_humidity
  ENT_HUM_KITCHEN: sensor.kitchen_humidity
  ENT_HUM_KIDS: sensor.childs_room_humidity
