  ARTHUR_SPROUT_SINCE_DIAPER: sensor.sprout_track_arthur_arthur_time_since_diaper_hh_mm
  ARTHUR_SPROUT_FEEDS_TODAY: sensor.sprout_track_arthur_arthur_feeds_today
  ARTHUR_SPROUT_DIAPERS_TODAY: sensor.sprout_track_arthur_arthur_diapers_today
