text_sensor:
  - platform: homeassistant
    id: vt_central_mode_state
    entity_id: ${ENT_VT_CENTRAL_MODE}
    on_value:
      then:
        - script.execute: ui_full_refresh_once
        - lambda: |-
            // Keep heating_central_mode_idx in sync with HA at all times
            const std::string s = x;

            int idx = 0;  // Auto
            if (s == "Stopped") idx = 1;
            else if (s == "Frost protection") idx = 2;

            id(heating_central_mode_idx) = idx;
        - if:
            condition:
              lvgl.page.is_showing: page_heating
            then:
              - script.execute: page_heating_refresh
