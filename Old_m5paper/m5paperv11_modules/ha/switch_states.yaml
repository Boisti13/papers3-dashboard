text_sensor:
  - platform: homeassistant
    id: st_tv
    entity_id: ${ENT_REMOTE_TV}
    internal: true
    on_value:
      then:
        - script.execute: ui_full_refresh_once
        - lambda: |-
            if (!id(page_switches).is_showing()) return;
            const std::string &s = x;
            const bool on  = s == "on";
            const bool bad = s.empty() || s == "unknown" || s == "unavailable";
            lv_obj_set_style_bg_color(id(sw_tile_tv), lv_color_hex(on ? 0x999999 : 0xDDDDDD), 0);
            lv_obj_set_style_bg_opa(id(sw_tile_tv), LV_OPA_COVER, 0);
            lv_obj_set_style_border_color(id(sw_tile_tv), lv_color_hex(bad || on ? 0x777777 : 0xBBBBBB), 0);
            lv_obj_set_style_border_width(id(sw_tile_tv), bad ? 2 : 1, 0);
            lv_label_set_text(id(sw_status_tv), on ? "ON" : "OFF");

