substitutions:
  TILE_W: "240"
  TILE_H: "180"
  ROW2_Y: "196"
  ROW3_Y: "392"

script:
  - id: page_switches_prepare
    mode: restart
    then:
      - lambda: |-
          id(ui_title) = "Switches";
          id(ui_parent_page) = 0;
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
      - script.execute: ui_apply_chrome
      - script.execute: page_switches_refresh

  - id: page_switches_refresh
    mode: restart
    then:
      - if:
          condition:
            lvgl.page.is_showing: page_switches
          then:
            - lambda: |-
                auto is_on = [](const std::string &s) -> bool {
                  return s == "on";
                };

                auto is_bad = [](const std::string &s) -> bool {
                  return s.empty() || s == "unknown" || s == "unavailable";
                };

                auto paint = [&](lv_obj_t *btn, lv_obj_t *icon, lv_obj_t *label, lv_obj_t *status, const std::string &state) {
                  const bool on = is_on(state);
                  const bool bad = is_bad(state);

                  lv_obj_set_style_bg_color(btn, lv_color_hex(on ? 0x999999 : 0xDDDDDD), 0);
                  lv_obj_set_style_bg_opa(btn, LV_OPA_COVER, 0);
                  lv_obj_set_style_border_color(btn, lv_color_hex(bad ? 0x777777 : (on ? 0x777777 : 0xBBBBBB)), 0);
                  lv_obj_set_style_border_width(btn, bad ? 2 : 1, 0);
                  lv_obj_set_style_radius(btn, 12, 0);
                  lv_obj_set_style_shadow_width(btn, 0, 0);
                  lv_obj_set_style_outline_width(btn, 0, 0);

                  const lv_color_t txt = lv_color_hex(0x000000);
                  lv_obj_set_style_text_color(icon, txt, 0);
                  lv_obj_set_style_text_color(label, txt, 0);

                  lv_label_set_text(status, on ? "ON" : "OFF");
                };

                paint(id(sw_tile_tv),         id(sw_icon_tv),         id(sw_lbl_tv),         id(sw_status_tv),         id(st_tv).state);
                paint(id(sw_tile_tv_socket),  id(sw_icon_tv_socket),  id(sw_lbl_tv_socket),  id(sw_status_tv_socket),  id(st_tv_socket).state);
                paint(id(sw_tile_shield),     id(sw_icon_shield),     id(sw_lbl_shield),     id(sw_status_shield),     id(st_shield).state);
                paint(id(sw_tile_living_led), id(sw_icon_living_led), id(sw_lbl_living_led), id(sw_status_living_led), id(st_living_led).state);
                paint(id(sw_tile_kitchen),    id(sw_icon_kitchen),    id(sw_lbl_kitchen),    id(sw_status_kitchen),    id(st_kitchen).state);
                paint(id(sw_tile_heatlamp),   id(sw_icon_heatlamp),   id(sw_lbl_heatlamp),   id(sw_status_heatlamp),   id(st_heatlamp).state);

  - id: sw_toggle_tv
    mode: restart
    then:
      - script.execute: ui_full_refresh_once
      - lambda: |-
          const bool will_be_on = id(st_tv).state != "on";
          lv_obj_set_style_bg_color(id(sw_tile_tv), lv_color_hex(will_be_on ? 0x999999 : 0xDDDDDD), 0);
          lv_obj_set_style_bg_opa(id(sw_tile_tv), LV_OPA_COVER, 0);
          lv_obj_set_style_border_color(id(sw_tile_tv), lv_color_hex(will_be_on ? 0x777777 : 0xBBBBBB), 0);
          lv_label_set_text(id(sw_status_tv), will_be_on ? "ON" : "OFF");
      - homeassistant.service:
          service: homeassistant.toggle
          data:
            entity_id: ${ENT_REMOTE_TV}

  - id: sw_toggle_tv_socket
    mode: restart
    then:
      - lambda: |-
          const bool will_be_on = id(st_tv_socket).state != "on";
          lv_obj_set_style_bg_color(id(sw_tile_tv_socket), lv_color_hex(will_be_on ? 0x999999 : 0xDDDDDD), 0);
          lv_obj_set_style_bg_opa(id(sw_tile_tv_socket), LV_OPA_COVER, 0);
          lv_obj_set_style_border_color(id(sw_tile_tv_socket), lv_color_hex(will_be_on ? 0x777777 : 0xBBBBBB), 0);
          lv_label_set_text(id(sw_status_tv_socket), will_be_on ? "ON" : "OFF");
      - homeassistant.service:
          service: homeassistant.toggle
          data:
            entity_id: ${ENT_SW_TV_SOCKET}

  - id: sw_toggle_shield
    mode: restart
    then:
      - lambda: |-
          const bool will_be_on = id(st_shield).state != "on";
          lv_obj_set_style_bg_color(id(sw_tile_shield), lv_color_hex(will_be_on ? 0x999999 : 0xDDDDDD), 0);
          lv_obj_set_style_bg_opa(id(sw_tile_shield), LV_OPA_COVER, 0);
          lv_obj_set_style_border_color(id(sw_tile_shield), lv_color_hex(will_be_on ? 0x777777 : 0xBBBBBB), 0);
          lv_label_set_text(id(sw_status_shield), will_be_on ? "ON" : "OFF");
      - homeassistant.service:
          service: homeassistant.toggle
          data:
            entity_id: ${ENT_REMOTE_SHIELD}

  - id: sw_toggle_living_led
    mode: restart
    then:
      - lambda: |-
          const bool will_be_on = id(st_living_led).state != "on";
          lv_obj_set_style_bg_color(id(sw_tile_living_led), lv_color_hex(will_be_on ? 0x999999 : 0xDDDDDD), 0);
          lv_obj_set_style_bg_opa(id(sw_tile_living_led), LV_OPA_COVER, 0);
          lv_obj_set_style_border_color(id(sw_tile_living_led), lv_color_hex(will_be_on ? 0x777777 : 0xBBBBBB), 0);
          lv_label_set_text(id(sw_status_living_led), will_be_on ? "ON" : "OFF");
      - homeassistant.service:
          service: homeassistant.toggle
          data:
            entity_id: ${ENT_LIGHT_LIVING_LED}

  - id: sw_toggle_kitchen
    mode: restart
    then:
      - lambda: |-
          const bool will_be_on = id(st_kitchen).state != "on";
          lv_obj_set_style_bg_color(id(sw_tile_kitchen), lv_color_hex(will_be_on ? 0x999999 : 0xDDDDDD), 0);
          lv_obj_set_style_bg_opa(id(sw_tile_kitchen), LV_OPA_COVER, 0);
          lv_obj_set_style_border_color(id(sw_tile_kitchen), lv_color_hex(will_be_on ? 0x777777 : 0xBBBBBB), 0);
          lv_label_set_text(id(sw_status_kitchen), will_be_on ? "ON" : "OFF");
      - homeassistant.service:
          service: homeassistant.toggle
          data:
            entity_id: ${ENT_LIGHT_KITCHEN_MAIN}

  - id: sw_toggle_heatlamp
    mode: restart
    then:
      - lambda: |-
          const bool will_be_on = id(st_heatlamp).state != "on";
          lv_obj_set_style_bg_color(id(sw_tile_heatlamp), lv_color_hex(will_be_on ? 0x999999 : 0xDDDDDD), 0);
          lv_obj_set_style_bg_opa(id(sw_tile_heatlamp), LV_OPA_COVER, 0);
          lv_obj_set_style_border_color(id(sw_tile_heatlamp), lv_color_hex(will_be_on ? 0x777777 : 0xBBBBBB), 0);
          lv_label_set_text(id(sw_status_heatlamp), will_be_on ? "ON" : "OFF");
      - homeassistant.service:
          service: homeassistant.toggle
          data:
            entity_id: ${ENT_SW_ARTHUR_SOCKET}

lvgl:
  pages:
    - id: page_switches
      scrollable: false
      scrollbar_mode: "OFF"
      bg_color: ${C_BG}
      bg_opa: COVER

      on_load:
        then:
          - script.execute: page_switches_prepare

      widgets:
        - obj:
            id: switches_bg
            x: 0
            y: 60
            width: 540
            height: 812
            styles: st_page_bg
            scrollable: false
            scrollbar_mode: "OFF"
            clickable: false

        - obj:
            id: switches_root
            x: 20
            y: 120
            width: 500
            height: 572
            pad_all: 0
            border_width: 0
            bg_opa: TRANSP
            scrollable: false
            scrollbar_mode: "OFF"
            clickable: false

            widgets:
              # ===== Row 1 =====
              - button:
                  id: sw_tile_tv
                  x: 0
                  y: 0
                  width: ${TILE_W}
                  height: ${TILE_H}
                  styles: st_tile_button
                  scrollable: false
                  pressed:
                    bg_color: 0xBBBBBB
                    bg_opa: COVER
                    outline_width: 0
                  on_click:
                    - script.execute: sw_toggle_tv
                  widgets:
                    - label:
                        id: sw_icon_tv
                        x: 0
                        y: 35
                        width: ${TILE_W}
                        text_align: center
                        text: "${ICO_HOME}"
                        text_font: font_mdi_l
                    - label:
                        id: sw_status_tv
                        x: 190
                        y: 10
                        text: "---"
                        text_font: font_ubuntu_s
                    - label:
                        id: sw_lbl_tv
                        x: 0
                        y: 105
                        width: ${TILE_W}
                        text: "TV"
                        text_align: center
                        text_font: font_ubuntu_l

              - button:
                  id: sw_tile_tv_socket
                  x: 260
                  y: 0
                  width: ${TILE_W}
                  height: ${TILE_H}
