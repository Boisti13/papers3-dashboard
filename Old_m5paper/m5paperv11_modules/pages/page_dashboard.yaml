                        align: CENTER
                        width: 240
                        text_align: center
                        styles: st_body_text
                        text: "Switches"

              - button:
                  id: dash_btn_cleaning
                  x: 0
                  y: 191
                  width: 240
                  height: 173
                  styles: st_tile_button
                  bg_color: 0xDDDDDD
                  bg_opa: COVER
                  pressed:
                    bg_color: 0xBBBBBB
                    bg_opa: COVER
                    outline_width: 0
                  on_click:
