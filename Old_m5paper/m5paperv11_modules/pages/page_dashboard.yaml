lvgl:
  pages:
    - id: page_dashboard
      scrollable: false
      scrollbar_mode: "OFF"
      bg_color: ${C_BG}
      bg_opa: COVER
      on_load:
        - script.execute: page_dashboard_prepare

      widgets:
        - obj:
            id: dashboard_bg
            x: 0
            y: 60
            width: 540
            height: 812
            styles: st_page_bg
            scrollable: false
            clickable: false

        - obj:
            id: dashboard_root
            x: 20
            y: 86
            width: 500
            height: 764
            styles: st_page_content
            scrollable: false
            clickable: false

            widgets:
              - button:
                  id: dash_btn_heating
                  x: 0
                  y: 0
                  width: 240
                  height: 173
                  styles: st_tile_button
                  bg_color: 0xDDDDDD
                  bg_opa: COVER
                  pressed:
                    bg_color: 0xBBBBBB
                    bg_opa: COVER
                    outline_width: 0
                  on_click:
                    - script.execute: ui_open_heating
                  widgets:
                    - label:
                        align: CENTER
                        width: 240
                        text_align: center
                        styles: st_body_text
                        text: "Heating"

              - button:
                  id: dash_btn_switches
                  x: 260
                  y: 0
                  width: 240
                  height: 173
                  styles: st_tile_button
                  bg_color: 0xDDDDDD
                  bg_opa: COVER
                  pressed:
                    bg_color: 0xBBBBBB
                    bg_opa: COVER
                    outline_width: 0
                  on_click:
                    - script.execute: ui_open_switches
                  widgets:
