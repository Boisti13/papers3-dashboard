                    - label:
                        align: CENTER
                        width: 240
                        text_align: center
                        styles: st_body_text
                        text: "Cleaning"

              - button:
                  id: dash_btn_arthur
                  x: 260
                  y: 191
                  width: 240
                  height: 173
                  styles: st_tile_button
                  bg_color: 0xDDDDDD
                  bg_opa: COVER
                  pressed:
                    bg_color: 0xBBBBBB
                    bg_opa: COVER
                    outline_width: 0
                  on_click:
                    - script.execute: ui_open_arthur
