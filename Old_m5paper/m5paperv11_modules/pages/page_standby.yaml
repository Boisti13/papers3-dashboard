# m5paperv11_modules/pages/page_standby.yaml
# Standby screen shown before deep sleep. Retained on e-paper while powered off.

lvgl:
  pages:
    - id: page_standby
      scrollable: false
      scrollbar_mode: "OFF"
      bg_color: ${C_BG}
      bg_opa: COVER

      widgets:
        - label:
            id: standby_title
            align: CENTER
            y: -60
            text: "K-Town"
            text_font: font_ubuntu_xxl
            text_color: ${C_TEXT}
            text_align: CENTER

        - label:
            id: standby_hint
            align: CENTER
            y: 80
            text: "press power button to wake"
            text_font: font_ubuntu_l
            text_color: ${C_TEXT_MUTED}
            text_align: CENTER
