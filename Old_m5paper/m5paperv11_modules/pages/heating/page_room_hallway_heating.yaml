script:
  - id: page_room_hallway_prepare
    mode: restart
    then:
      - lambda: |-
          id(ui_title) = "Hallway";

          id(ui_left_mode) = 4;               // GOTO dashboard
          id(ui_left_target) = "dashboard";
          id(ui_left_icon) = "\U000F02DC";
