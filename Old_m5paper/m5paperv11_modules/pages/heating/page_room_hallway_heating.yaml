          id(ui_right_mode) = 4;              // GOTO heating
          id(ui_right_target) = "heating";
          id(ui_right_icon) = "\U000F0141";   // mdi:chevron-left
          id(ui_right_enabled) = true;

      - script.execute: ui_header_apply
