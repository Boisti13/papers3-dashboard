# m5paperv11_modules/pages/heating/page_room_kitchen_heating.yaml

# --------- HA inputs ----------
sensor:
  - platform: homeassistant
    id: kit_cur_temp
    entity_id: ${ROOM_2_TRV}
    attribute: current_temperature
    on_value:
      then:
        - script.execute: ui_full_refresh_once
        - lvgl.label.update:
            id: kit_lbl_temp
            text: !lambda |-
              char buf[16];
              if (isnan(x)) return std::string("--.-°C");
              snprintf(buf, sizeof(buf), "%.1f°C", x);
              return std::string(buf);

  - platform: homeassistant
    id: kit_setpoint_attr
    entity_id: ${ROOM_2_TRV}
    attribute: temperature
    on_value:
      then:
        - if:
            condition:
              lambda: 'return (millis() - id(kit_last_push_ms)) >= 1200;'
            then:
              - lambda: |-
                  if (!isnan(x)) {
                    auto call = id(kit_sp).make_call();
                    call.set_value(x);
                    call.perform();
                  }
              - script.execute: ui_full_refresh_once
              - script.execute: page_room_kit_refresh

  - platform: homeassistant
    id: kit_hum
    entity_id: ${ROOM_2_HUM}
    on_value:
      then:
        - script.execute: ui_full_refresh_once
        - lvgl.label.update:
            id: kit_lbl_hum
            text: !lambda |-
              char buf[16];
              if (isnan(x)) return std::string("--%");
              snprintf(buf, sizeof(buf), "%.0f%%", x);
              return std::string(buf);

binary_sensor:
  - platform: homeassistant
    id: kit_window
    entity_id: ${ROOM_2_WINDOW}

text_sensor:
  - platform: homeassistant
    id: kit_hvac_action
    entity_id: ${ROOM_2_TRV}
    attribute: hvac_action
    on_value:
      then:
        - script.execute: ui_full_refresh_once
        - lvgl.label.update:
            id: kit_ico_hvac
            text: !lambda |-
              if (x == "heating") return std::string("\U000F0438");
              return std::string("\U000F0AD8");
        - lvgl.label.update:
            id: kit_lbl_hvac
            text: !lambda |-
              if (x == "heating") return std::string("Heating");
              return std::string("Off");

  - platform: homeassistant
    id: kit_preset_mode
    entity_id: ${ROOM_2_TRV}
    attribute: preset_mode
    on_value:
      then:
        - script.execute: ui_full_refresh_once
        - script.execute: kit_update_preset_ui

  - platform: homeassistant
    id: kit_hvac_mode
    entity_id: ${ROOM_2_TRV}
    attribute: hvac_mode
    on_value:
      then:
        - script.execute: ui_full_refresh_once
        - script.execute: kit_update_mode_ui

# --------- Local setpoint number ----------
number:
  - platform: template
    id: kit_sp
    optimistic: true
    min_value: 5.0
    max_value: 30.0
    step: 0.5
    initial_value: 20.0
    restore_value: false

# --------- Local UI state ----------
globals:
  - id: kit_last_push_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

# --------- Scripts ----------
script:
  - id: page_room_kit_prepare
    mode: restart
    then:
      - lambda: |-
          id(ui_title) = "${ROOM_2_NAME}";
          id(ui_parent_page) = 1;
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = false;
      - script.execute: ui_apply_chrome
      - lambda: |-
          auto sp = id(kit_setpoint_attr).state;
          if (!isnan(sp)) {
            auto call = id(kit_sp).make_call();
            call.set_value(sp);
            call.perform();
          }
      - script.execute: kit_update_preset_ui
      - script.execute: kit_update_mode_ui
      - script.execute: page_room_kit_refresh

  - id: kit_setpoint_dec
    mode: restart
    then:
      - lambda: |-
          float v = id(kit_sp).state - 0.5f;
          if (v < 5.0f) v = 5.0f;
          id(kit_last_push_ms) = millis();
          auto call = id(kit_sp).make_call();
          call.set_value(v);
          call.perform();
      - lvgl.label.update:
          id: kit_lbl_setpoint
          text:
            format: "%.1f°C"
            args: [ 'id(kit_sp).state' ]
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: ${ROOM_2_TRV}
            temperature: !lambda "return id(kit_sp).state;"

  - id: kit_setpoint_inc
    mode: restart
    then:
      - lambda: |-
          float v = id(kit_sp).state + 0.5f;
          if (v > 30.0f) v = 30.0f;
          id(kit_last_push_ms) = millis();
          auto call = id(kit_sp).make_call();
          call.set_value(v);
          call.perform();
      - lvgl.label.update:
          id: kit_lbl_setpoint
          text:
            format: "%.1f°C"
            args: [ 'id(kit_sp).state' ]
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: ${ROOM_2_TRV}
            temperature: !lambda "return id(kit_sp).state;"

  - id: kit_update_preset_ui
    mode: restart
    then:
      - if:
          condition:
            lvgl.page.is_showing: page_room_kit
          then:
            - lvgl.widget.update:
                id: kit_btn_frost
                border_color: !lambda |-
                  return (id(kit_preset_mode).state == "frost")
                    ? lv_color_hex(0x333333) : lv_color_hex(0xBBBBBB);
                border_width: !lambda |-
                  return (id(kit_preset_mode).state == "frost") ? 3 : 1;

            - lvgl.widget.update:
                id: kit_btn_eco
                border_color: !lambda |-
                  return (id(kit_preset_mode).state == "eco")
                    ? lv_color_hex(0x333333) : lv_color_hex(0xBBBBBB);
                border_width: !lambda |-
                  return (id(kit_preset_mode).state == "eco") ? 3 : 1;

            - lvgl.widget.update:
                id: kit_btn_comfort
                border_color: !lambda |-
                  return (id(kit_preset_mode).state == "comfort")
                    ? lv_color_hex(0x333333) : lv_color_hex(0xBBBBBB);
                border_width: !lambda |-
                  return (id(kit_preset_mode).state == "comfort") ? 3 : 1;

            - lvgl.widget.update:
                id: kit_btn_boost
                border_color: !lambda |-
                  return (id(kit_preset_mode).state == "boost")
                    ? lv_color_hex(0x333333) : lv_color_hex(0xBBBBBB);
                border_width: !lambda |-
                  return (id(kit_preset_mode).state == "boost") ? 3 : 1;

  - id: kit_update_mode_ui
    mode: restart
    then:
      - if:
          condition:
            lvgl.page.is_showing: page_room_kit
          then:
            - lambda: |-
                const bool is_off = (id(kit_hvac_mode).state == "off");
                lv_obj_set_style_text_color(
                  id(kit_lbl_mode_icon),
                  lv_color_hex(is_off ? 0x777777 : 0x000000),
                  0
                );
                lv_obj_set_style_border_color(
                  id(kit_btn_mode),
                  lv_color_hex(is_off ? 0xBBBBBB : 0x333333),
                  0
                );
                lv_obj_set_style_border_width(id(kit_btn_mode), is_off ? 1 : 3, 0);

  - id: page_room_kit_refresh
    mode: restart
    then:
      - if:
          condition:
            lvgl.page.is_showing: page_room_kit
          then:
            - lvgl.label.update:
                id: kit_lbl_setpoint
                text:
                  format: "%.1f°C"
                  args: [ 'id(kit_sp).state' ]

            - lvgl.label.update:
                id: kit_lbl_temp
                text: !lambda |-
                  char buf[16];
                  auto v = id(kit_cur_temp).state;
                  if (isnan(v)) return std::string("--.-°C");
                  snprintf(buf, sizeof(buf), "%.1f°C", v);
                  return std::string(buf);

            - lvgl.label.update:
                id: kit_lbl_hum
                text: !lambda |-
                  char buf[16];
                  auto v = id(kit_hum).state;
                  if (isnan(v)) return std::string("--%");
                  snprintf(buf, sizeof(buf), "%.0f%%", v);
                  return std::string(buf);

            - lvgl.label.update:
                id: kit_lbl_window
                text: !lambda |-
                  return id(kit_window).state ? std::string("Open") : std::string("Closed");

            - lvgl.label.update:
                id: kit_ico_hvac
                text: !lambda |-
                  auto s = id(kit_hvac_action).state;
                  if (s == "heating") return std::string("\U000F0438");
                  return std::string("\U000F0AD8");

            - lvgl.label.update:
                id: kit_lbl_hvac
                text: !lambda |-
                  auto s = id(kit_hvac_action).state;
                  if (s == "heating") return std::string("Heating");
                  return std::string("Off");

interval:
  - interval: 2s
    then:
      - if:
          condition:
            lvgl.page.is_showing: page_room_kit
          then:
            - script.execute: page_room_kit_refresh

# --------- LVGL Page ----------
lvgl:
  pages:
    - id: page_room_kit
      scrollable: false
      scrollbar_mode: "OFF"
      bg_color: ${C_BG}
      bg_opa: COVER

      on_load:
        then:
          - script.execute: page_room_kit_prepare

      widgets:
        - obj:
            id: kit_bg
            x: 0
            y: 60
            width: 540
            height: 812
            styles: st_page_bg
            scrollable: false
            scrollbar_mode: "OFF"
            clickable: false

        - obj:
            id: kit_root
            x: 20
            y: 90
            width: 500
            height: 650
            bg_color: ${C_BG}
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "OFF"
            clickable: false

            widgets:

              # ===== Row 1: Setpoint — [ - ]  value  [ + ] =====
              - button:
                  id: kit_btn_minus
                  x: 0
                  y: 100
                  width: 120
                  height: 120
                  bg_color: ${C_SURFACE}
                  bg_opa: COVER
                  border_color: ${C_BORDER}
                  border_width: 1
                  radius: 12
                  shadow_width: 0
                  shadow_opa: TRANSP
                  outline_width: 0
                  pressed:
                    bg_color: ${C_BORDER}
                    bg_opa: COVER
                    outline_width: 0
                  on_press:
                    - script.execute: kit_setpoint_dec
                  widgets:
                    - label:
                        align: CENTER
                        text: "-"
                        text_font: font_ubuntu_xl
                        text_color: ${C_TEXT}

              - label:
                  id: kit_lbl_setpoint
                  x: 120
                  y: 130
                  width: 260
                  text_align: CENTER
                  text: "--.-°C"
                  text_font: font_ubuntu_xl
                  text_color: ${C_TEXT}

              - button:
                  id: kit_btn_plus
                  x: 380
                  y: 100
                  width: 120
                  height: 120
                  bg_color: ${C_SURFACE}
                  bg_opa: COVER
                  border_color: ${C_BORDER}
                  border_width: 1
                  radius: 12
                  shadow_width: 0
                  shadow_opa: TRANSP
                  outline_width: 0
                  pressed:
                    bg_color: ${C_BORDER}
                    bg_opa: COVER
                    outline_width: 0
                  on_press:
                    - script.execute: kit_setpoint_inc
                  widgets:
                    - label:
                        align: CENTER
                        text: "+"
                        text_font: font_ubuntu_xl
                        text_color: ${C_TEXT}

              # ===== Row 2: HVAC action + Window =====
              - obj:
                  x: 0
                  y: 350
                  width: 48
                  height: 48
                  bg_color: ${C_BG}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  shadow_width: 0
                  clickable: false
                  widgets:
                    - label:
                        id: kit_ico_hvac
                        align: CENTER
                        text: "\U000F0AD8"
                        text_font: font_mdi_l

              - obj:
                  x: 48
                  y: 350
                  width: 212
                  height: 48
                  bg_color: ${C_BG}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  shadow_width: 0
                  clickable: false
                  widgets:
                    - label:
                        id: kit_lbl_hvac
                        align: LEFT_MID
                        text: "Off"
                        text_font: font_ubuntu_l

              - obj:
                  x: 260
                  y: 350
                  width: 48
                  height: 48
                  bg_color: ${C_BG}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  shadow_width: 0
                  clickable: false
                  widgets:
                    - label:
                        id: kit_ico_window
                        align: CENTER
                        text: "\U000F05AE"
                        text_font: font_mdi_l

              - obj:
                  x: 308
                  y: 350
                  width: 192
                  height: 48
                  bg_color: ${C_BG}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  shadow_width: 0
                  clickable: false
                  widgets:
                    - label:
                        id: kit_lbl_window
                        align: LEFT_MID
                        text: "-"
                        text_font: font_ubuntu_l

              # ===== Row 3: Temperature + Humidity =====
              - obj:
                  x: 0
                  y: 445
                  width: 48
                  height: 48
                  bg_color: ${C_BG}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  shadow_width: 0
                  clickable: false
                  widgets:
                    - label:
                        id: kit_ico_temp
                        align: CENTER
                        text: "\U000F0F55"
                        text_font: font_mdi_l

              - obj:
                  x: 48
                  y: 438
                  width: 212
                  height: 60
                  bg_color: ${C_BG}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  shadow_width: 0
                  clickable: false
                  widgets:
                    - label:
                        id: kit_lbl_temp
                        align: LEFT_MID
                        text: "--.-°C"
                        text_font: font_ubuntu_xl

              - obj:
                  x: 260
                  y: 445
                  width: 48
                  height: 48
                  bg_color: ${C_BG}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  shadow_width: 0
                  clickable: false
                  widgets:
                    - label:
                        id: kit_ico_hum
                        align: CENTER
                        text: "\U000F058E"
                        text_font: font_mdi_l

              - obj:
                  x: 308
                  y: 438
                  width: 192
                  height: 60
                  bg_color: ${C_BG}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  shadow_width: 0
                  clickable: false
                  widgets:
                    - label:
                        id: kit_lbl_hum
                        align: LEFT_MID
                        text: "--%"
                        text_font: font_ubuntu_xl

              # ===== Row 4: Preset buttons + HVAC mode toggle =====
              - obj:
                  id: kit_preset_row
                  x: 0
                  y: 550
                  width: 500
                  height: 80
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  scrollbar_mode: "OFF"

                  widgets:
                    - button:
                        id: kit_btn_frost
                        x: 0
                        y: 0
                        width: 80
                        height: 80
                        radius: 14
                        bg_color: ${C_SURFACE}
                        bg_opa: COVER
                        border_width: 1
                        border_color: ${C_BORDER}
                        shadow_width: 0
                        outline_width: 0
                        pressed:
                          bg_color: ${C_BORDER}
                          bg_opa: COVER
                          outline_width: 0
                        on_click:
                          - if:
                              condition:
                                lambda: 'return millis() >= id(ui_touch_block_until);'
                              then:
                                - homeassistant.service:
                                    service: climate.set_preset_mode
                                    data:
                                      entity_id: ${ROOM_2_TRV}
                                      preset_mode: frost
                        widgets:
                          - label:
                              text: ${ICO_PRESET_FROST}
                              align: center
                              text_font: font_mdi_xl
                              text_color: ${C_TEXT}

                    - button:
                        id: kit_btn_eco
                        x: 100
                        y: 0
                        width: 80
                        height: 80
                        radius: 14
                        bg_color: ${C_SURFACE}
                        bg_opa: COVER
                        border_width: 1
                        border_color: ${C_BORDER}
                        shadow_width: 0
                        outline_width: 0
                        pressed:
                          bg_color: ${C_BORDER}
                          bg_opa: COVER
                          outline_width: 0
                        on_click:
                          - if:
                              condition:
                                lambda: 'return millis() >= id(ui_touch_block_until);'
                              then:
                                - homeassistant.service:
                                    service: climate.set_preset_mode
                                    data:
                                      entity_id: ${ROOM_2_TRV}
                                      preset_mode: eco
                        widgets:
                          - label:
                              text: ${ICO_PRESET_ECO}
                              align: center
                              text_font: font_mdi_xl
                              text_color: ${C_TEXT}

                    - button:
                        id: kit_btn_comfort
                        x: 200
                        y: 0
                        width: 80
                        height: 80
                        radius: 14
                        bg_color: ${C_SURFACE}
                        bg_opa: COVER
                        border_width: 1
                        border_color: ${C_BORDER}
                        shadow_width: 0
                        outline_width: 0
                        pressed:
                          bg_color: ${C_BORDER}
                          bg_opa: COVER
                          outline_width: 0
                        on_click:
                          - if:
                              condition:
                                lambda: 'return millis() >= id(ui_touch_block_until);'
                              then:
                                - homeassistant.service:
                                    service: climate.set_preset_mode
                                    data:
                                      entity_id: ${ROOM_2_TRV}
                                      preset_mode: comfort
                        widgets:
                          - label:
                              text: ${ICO_PRESET_COMFORT}
                              align: center
                              text_font: font_mdi_xl
                              text_color: ${C_TEXT}

                    - button:
                        id: kit_btn_boost
                        x: 300
                        y: 0
                        width: 80
                        height: 80
                        radius: 14
                        bg_color: ${C_SURFACE}
                        bg_opa: COVER
                        border_width: 1
                        border_color: ${C_BORDER}
                        shadow_width: 0
                        outline_width: 0
                        pressed:
                          bg_color: ${C_BORDER}
                          bg_opa: COVER
                          outline_width: 0
                        on_click:
                          - if:
                              condition:
                                lambda: 'return millis() >= id(ui_touch_block_until);'
                              then:
                                - homeassistant.service:
                                    service: climate.set_preset_mode
                                    data:
                                      entity_id: ${ROOM_2_TRV}
                                      preset_mode: boost
                        widgets:
                          - label:
                              text: ${ICO_PRESET_BOOST}
                              align: center
                              text_font: font_mdi_xl
                              text_color: ${C_TEXT}

                    - button:
                        id: kit_btn_mode
                        x: 420
                        y: 0
                        width: 80
                        height: 80
                        radius: 14
                        bg_color: ${C_SURFACE}
                        bg_opa: COVER
                        border_width: 1
                        border_color: ${C_BORDER}
                        shadow_width: 0
                        outline_width: 0
                        pressed:
                          bg_color: ${C_BORDER}
                          bg_opa: COVER
                          outline_width: 0
                        on_click:
                          - if:
                              condition:
                                lambda: 'return millis() >= id(ui_touch_block_until);'
                              then:
                                - homeassistant.service:
                                    service: climate.set_hvac_mode
                                    data:
                                      entity_id: ${ROOM_2_TRV}
                                      hvac_mode: !lambda |-
                                        return (id(kit_hvac_mode).state == "off") ? "heat" : "off";
                                - script.execute: ui_full_refresh_once
                                - script.execute: kit_update_mode_ui
                        widgets:
                          - label:
                              id: kit_lbl_mode_icon
                              text: ${ICO_HVAC_MODE}
                              align: center
                              text_font: font_mdi_xl
