script:
  - id: page_heating_prepare
    mode: restart
    then:
      - lambda: |-
          id(ui_title) = "Heating";
          id(ui_parent_page) = 0;
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
      - script.execute: ui_apply_chrome
      - script.execute: page_heating_refresh

  - id: page_heating_refresh
    mode: restart
    then:
      - lambda: |-
          const int idx = id(heating_central_mode_idx);

          const uint32_t c_on  = 0x222222;
          const uint32_t c_off = 0xDDDDDD;
          const uint32_t t_on  = 0xFFFFFF;
          const uint32_t t_off = 0x000000;

          lv_obj_set_style_bg_color(id(heat_btn_auto),  lv_color_hex(idx == 0 ? c_on : c_off), 0);
          lv_obj_set_style_bg_color(id(heat_btn_stop),  lv_color_hex(idx == 1 ? c_on : c_off), 0);
          lv_obj_set_style_bg_color(id(heat_btn_frost), lv_color_hex(idx == 2 ? c_on : c_off), 0);

          lv_obj_set_style_text_color(id(heat_lbl_auto),  lv_color_hex(idx == 0 ? t_on : t_off), 0);
          lv_obj_set_style_text_color(id(heat_lbl_stop),  lv_color_hex(idx == 1 ? t_on : t_off), 0);
          lv_obj_set_style_text_color(id(heat_lbl_frost), lv_color_hex(idx == 2 ? t_on : t_off), 0);

lvgl:
  pages:
    - id: page_heating
      scrollable: false
      scrollbar_mode: "OFF"
      bg_color: ${C_BG}
      bg_opa: COVER

      on_load:
        then:
          - script.execute: page_heating_prepare

      widgets:
        - obj:
            id: heating_bg
            x: 0
            y: 60
            width: 540
            height: 812
            styles: st_page_bg
            scrollable: false
            scrollbar_mode: "OFF"
            clickable: false

        - obj:
            id: heating_root
            x: 20
            y: 86
            width: 500
            height: 574
            pad_all: 0
            border_width: 0
            bg_opa: TRANSP
            scrollable: false
            scrollbar_mode: "OFF"
            clickable: false

            widgets:

              # ===== Row 1 =====
              - button:
                  id: heat_btn_bathroom
                  x: 0
                  y: 0
                  width: 240
                  height: 120
                  styles: st_tile_button
                  scrollable: false
                  pressed:
                    bg_color: 0xBBBBBB
                    bg_opa: COVER
                    outline_width: 0
                  on_click:
                    - script.execute: ui_open_room_bat_heating
                  widgets:
                    - label:
                        align: CENTER
                        text: "Bathroom"
                        text_font: font_ubuntu_l

              - button:
                  id: heat_btn_kitchen
                  x: 260
                  y: 0
                  width: 240
                  height: 120
                  styles: st_tile_button
                  scrollable: false
                  pressed:
                    bg_color: 0xBBBBBB
                    bg_opa: COVER
                    outline_width: 0
                  on_click:
                    - script.execute: ui_open_room_kit_heating
