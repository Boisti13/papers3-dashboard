              # ===== Central Control Tile =====
              - obj:
                  id: heat_tile_control_all
                  x: 0
                  y: 424
                  width: 500
                  height: 150
                  styles: st_tile_button
                  scrollable: false
                  scrollbar_mode: "OFF"
                  clickable: false
                  widgets:
