# m5paperv11_modules/pages/page_cleaning.yaml
# Vacuum / cleaning control page.
# Ported from remote_modules — adapted for 540px e-paper, m5paperv11 theme.

# --------- HA inputs ----------
binary_sensor:
  - platform: homeassistant
    id: vac_room_bathroom
    entity_id: ${VAC_ROOM_BATHROOM}
    on_state:
      then:
        - script.execute: page_cleaning_refresh

  - platform: homeassistant
    id: vac_room_hallway
    entity_id: ${VAC_ROOM_HALLWAY}
    on_state:
      then:
        - script.execute: page_cleaning_refresh

  - platform: homeassistant
    id: vac_room_bedroom
    entity_id: ${VAC_ROOM_BEDROOM}
    on_state:
      then:
        - script.execute: page_cleaning_refresh

  - platform: homeassistant
    id: vac_room_living
    entity_id: ${VAC_ROOM_LIVING}
    on_state:
      then:
        - script.execute: page_cleaning_refresh

  - platform: homeassistant
    id: vac_room_kids
    entity_id: ${VAC_ROOM_KIDS}
    on_state:
      then:
        - script.execute: page_cleaning_refresh

  - platform: homeassistant
    id: vac_room_kitchen
    entity_id: ${VAC_ROOM_KITCHEN}
    on_state:
      then:
        - script.execute: page_cleaning_refresh

text_sensor:
  - platform: homeassistant
    id: vac_repeat
    entity_id: ${VAC_REPEAT_SELECT}
    on_value:
      then:
        - script.execute: page_cleaning_refresh

# --------- Scripts ----------
script:
  - id: page_cleaning_prepare
    mode: restart
    then:
      - lambda: |-
          id(ui_title) = "Cleaning";
          id(ui_parent_page) = 0;
          id(ui_left_enabled) = true;
          id(ui_right_enabled) = true;
          id(ui_next_draw_full) = true;
      - script.execute: ui_apply_chrome
      - script.execute: page_cleaning_refresh

  - id: page_cleaning_refresh
    mode: restart
    then:
      - if:
          condition:
            lvgl.page.is_showing: page_cleaning
          then:
            - lambda: |-
                auto set_tile = [&](lv_obj_t* btn, bool on) {
                  lv_obj_set_style_border_color(
                    btn,
                    on ? lv_color_hex(0x000000) : lv_color_hex(0xBBBBBB),
                    0
                  );
                  lv_obj_set_style_border_width(btn, on ? 3 : 1, 0);
                };

                set_tile(id(clean_btn_bathroom), id(vac_room_bathroom).state);
                set_tile(id(clean_btn_hallway),  id(vac_room_hallway).state);
                set_tile(id(clean_btn_bedroom),  id(vac_room_bedroom).state);
                set_tile(id(clean_btn_living),   id(vac_room_living).state);
                set_tile(id(clean_btn_kids),     id(vac_room_kids).state);
                set_tile(id(clean_btn_kitchen),  id(vac_room_kitchen).state);

                const std::string rep = id(vac_repeat).state;
                set_tile(id(clean_btn_rep1), rep == "1");
                set_tile(id(clean_btn_rep2), rep == "2");

  # --- room toggles ---
  - id: clean_toggle_bathroom
    then:
      - homeassistant.service:
          service: input_boolean.toggle
          data:
            entity_id: ${VAC_ROOM_BATHROOM}

  - id: clean_toggle_hallway
    then:
      - homeassistant.service:
          service: input_boolean.toggle
          data:
            entity_id: ${VAC_ROOM_HALLWAY}

  - id: clean_toggle_bedroom
    then:
      - homeassistant.service:
          service: input_boolean.toggle
          data:
            entity_id: ${VAC_ROOM_BEDROOM}

  - id: clean_toggle_living
    then:
      - homeassistant.service:
          service: input_boolean.toggle
          data:
            entity_id: ${VAC_ROOM_LIVING}

  - id: clean_toggle_kids
    then:
      - homeassistant.service:
          service: input_boolean.toggle
          data:
            entity_id: ${VAC_ROOM_KIDS}

  - id: clean_toggle_kitchen
    then:
      - homeassistant.service:
          service: input_boolean.toggle
          data:
            entity_id: ${VAC_ROOM_KITCHEN}

  # --- repeat ---
  - id: clean_set_repeat_1
    then:
      - homeassistant.service:
          service: input_select.select_option
          data:
            entity_id: ${VAC_REPEAT_SELECT}
            option: "1"

  - id: clean_set_repeat_2
    then:
      - homeassistant.service:
          service: input_select.select_option
          data:
            entity_id: ${VAC_REPEAT_SELECT}
            option: "2"

  # --- start selected rooms ---
  - id: clean_start_selected
    then:
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${VAC_SCRIPT_SELECTED_ROOMS}

  # --- global vacuum actions ---
  - id: clean_vac_all
    then:
      - homeassistant.service:
          service: vacuum.start
          data:
            entity_id: ${VACUUM_ENTITY}

  - id: clean_vac_pause
    then:
      - homeassistant.service:
          service: vacuum.pause
          data:
            entity_id: ${VACUUM_ENTITY}

  - id: clean_vac_dock
    then:
      - homeassistant.service:
          service: vacuum.return_to_base
          data:
            entity_id: ${VACUUM_ENTITY}

  - id: clean_vac_trash
    then:
      - homeassistant.service:
          service: script.turn_on
          data:
            entity_id: ${VAC_SCRIPT_TRASHCAN}

